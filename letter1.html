<!DOCTYPE html>
<html lang="id">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For shasha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#FFE4EC,
#FFF8D6
);

height:100vh;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

}

/* CARD */

.card{

width:90%;
max-width:650px;

min-height:250px;

background:
rgba(255,255,255,.8);

backdrop-filter:blur(10px);

border-radius:30px;

padding:40px;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

font-size:1.4rem;

color:#5c4b51;

box-shadow:
0 15px 40px rgba(0,0,0,.08);

cursor:pointer;

transition:.25s;

user-select:none;

}

.card:hover{

transform:scale(1.02);

}

.card:active{

transform:scale(.97);

}

.progress{

margin-top:20px;

color:#6d5c63;

font-size:.95rem;

}

.modeBtn{

margin-top:30px;

padding:14px 30px;

border:none;

border-radius:50px;

background:#F7C8D8;

font-weight:600;

cursor:pointer;

display:none;

transition:.3s;

}

.modeBtn:hover{

background:#FFE082;

transform:scale(1.05);

}

/* petals */

.petal{

position:absolute;

top:-40px;

font-size:20px;

pointer-events:none;

animation:fall linear forwards;

}

@keyframes fall{

to{

transform:
translateY(110vh)
rotate(360deg);

}

}

</style>
</head>

/* ========================= */
